# Render Blueprint — Akri.dz microservices deployment
# Docs: https://render.com/docs/blueprint-spec

databases:
  - name: akri-postgres
    databaseName: akri_db
    user: akri
    plan: free

services:

  # ── Infrastructure ──────────────────────────────────────────
  - type: redis
    name: akri-redis
    plan: free
    ipAllowList: []

  # ── Auth Service ─────────────────────────────────────────────
  - type: web
    name: akri-auth
    runtime: python
    rootDir: auth-service
    buildCommand: pip install -r requirements.txt
    startCommand: python manage.py migrate --no-input && python manage.py shell -c "from accounts.models import Admin; Admin.objects.filter(email='admin@akri.dz').exists() or Admin.objects.create(email='admin@akri.dz', password='Admin123456')" && gunicorn auth_project.wsgi:application --bind 0.0.0.0:$PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: akri-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: akri-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: CONSUL_HOST
        value: ""

  # ── API Service ──────────────────────────────────────────────
  - type: web
    name: akri-api
    runtime: python
    rootDir: api-service
    buildCommand: pip install -r requirements.txt
    startCommand: python manage.py migrate --no-input && gunicorn api_project.wsgi:application --bind 0.0.0.0:$PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: akri-postgres
          property: connectionString
      - key: AUTH_SERVICE_URL
        fromService:
          type: web
          name: akri-auth
          property: host
      - key: RABBITMQ_URL
        sync: false   # Fill in your CloudAMQP URL after creating free account at cloudamqp.com
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: CONSUL_HOST
        value: ""

  # ── Frontend Service ─────────────────────────────────────────
  - type: web
    name: akri-frontend
    runtime: python
    rootDir: frontend-service
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn frontend_project.wsgi:application --bind 0.0.0.0:$PORT
    plan: free
    envVars:
      - key: AUTH_SERVICE_URL
        fromService:
          type: web
          name: akri-auth
          property: host
      - key: API_SERVICE_URL
        fromService:
          type: web
          name: akri-api
          property: host
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"

  # ── Notification Worker ──────────────────────────────────────
  - type: web
    name: akri-worker
    runtime: python
    rootDir: notification-worker
    buildCommand: pip install -r requirements.txt
    startCommand: python worker.py
    plan: free
    envVars:
      - key: RABBITMQ_URL
        sync: false   # Same CloudAMQP URL as akri-api
      - key: CONSUL_HOST
        value: ""
