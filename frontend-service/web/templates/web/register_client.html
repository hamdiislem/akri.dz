{% extends "web/base.html" %}
{% block title %}Inscription Client — Akri.dz{% endblock %}
{% block content %}
<div class="max-w-md mx-auto bg-white rounded-xl shadow-sm p-8">
  <h2 class="text-2xl font-bold text-gray-900 mb-6 text-center">Inscription Client</h2>

  <form method="post" action="/register/client/" class="space-y-4">
    {% csrf_token %}

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Nom complet</label>
      <input type="text" name="full_name" required
        class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
      <input type="email" name="email" required
        class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Mot de passe</label>
      <input type="password" name="password" required
        class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Téléphone</label>
      <input type="tel" name="phone" required
        class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Wilaya</label>
      <input type="text" name="wilaya" required
        class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <button type="submit"
      class="w-full bg-blue-600 text-white py-2.5 rounded-lg hover:bg-blue-700 font-medium">
      Créer mon compte
    </button>
  </form>

  <p class="mt-4 text-center text-sm text-gray-500">
    Déjà inscrit ? <a href="/login/" class="text-blue-600 hover:underline">Se connecter</a>
  </p>
</div>
{% endblock %}
