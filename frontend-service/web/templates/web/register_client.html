{% extends "web/base.html" %}
{% block title %}Inscription Client — Akri.dz{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto">
  <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
    <div class="bg-gradient-to-r from-slate-900 to-blue-900 px-8 py-7 text-center">
      <h2 class="text-2xl font-black text-white">Créer un compte client</h2>
      <p class="text-slate-400 text-sm mt-1">Accès immédiat à la réservation</p>
    </div>
    <div class="p-8">
      <form method="post" action="/register/client/" class="space-y-4">
        {% csrf_token %}

        <!-- Identité -->
        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wide">Nom complet</label>
          <input type="text" name="full_name" required
            class="w-full border border-gray-200 rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 text-sm">
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wide">Âge</label>
            <input type="number" name="age" required min="18" max="99" placeholder="25"
              class="w-full border border-gray-200 rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 text-sm">
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wide">Genre</label>
            <select name="gender" required
              class="w-full border border-gray-200 rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 text-sm">
              <option value="">— Choisir —</option>
              <option value="M">Homme</option>
              <option value="F">Femme</option>
            </select>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wide">Situation familiale</label>
            <select name="marital_status" required
              class="w-full border border-gray-200 rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 text-sm">
              <option value="">— Choisir —</option>
              <option value="single">Célibataire</option>
              <option value="married">Marié(e)</option>
              <option value="divorced">Divorcé(e)</option>
              <option value="widowed">Veuf/Veuve</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wide">Personnes à charge <span class="font-normal text-gray-400">(optionnel)</span></label>
            <input type="number" name="family_size" min="0" max="20" placeholder="0"
              class="w-full border border-gray-200 rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 text-sm">
          </div>
        </div>

        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wide">N° Permis de conduire</label>
          <input type="text" name="driver_license" required placeholder="Ex : 0123456789"
            class="w-full border border-gray-200 rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 text-sm">
        </div>

        <!-- Contact -->
        <div class="border-t border-gray-100 pt-4">
          <label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wide">Email</label>
          <input type="email" name="email" required
            class="w-full border border-gray-200 rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 text-sm">
        </div>

        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wide">Mot de passe</label>
          <input type="password" name="password" required minlength="8"
            class="w-full border border-gray-200 rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 text-sm"
            placeholder="Minimum 8 caractères">
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wide">Téléphone</label>
            <input type="tel" name="phone" required placeholder="0555 00 00 00"
              class="w-full border border-gray-200 rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 text-sm">
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wide">Wilaya</label>
            <select name="wilaya" required
              class="w-full border border-gray-200 rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 text-sm">
              <option value="">— Choisir —</option>
              {% include "web/wilaya_options.html" %}
            </select>
          </div>
        </div>

        <button type="submit"
          class="w-full bg-blue-600 text-white py-3 rounded-xl hover:bg-blue-700 font-bold transition-colors mt-2">
          Créer mon compte
        </button>
      </form>
      <p class="mt-5 text-center text-sm text-gray-500">
        Déjà inscrit ? <a href="/login/" class="text-blue-600 hover:underline font-semibold">Se connecter</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
