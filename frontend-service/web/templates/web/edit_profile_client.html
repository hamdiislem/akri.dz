{% extends "web/base.html" %}
{% block title %}Modifier mon profil — Akri.dz{% endblock %}
{% block content %}
<div class="max-w-xl mx-auto">

  <div class="flex items-center gap-3 mb-6">
    <a href="/profile/client/" class="text-gray-400 hover:text-gray-600 text-sm transition-colors">← Mon profil</a>
    <span class="text-gray-300">/</span>
    <h1 class="text-2xl font-black text-gray-900">Modifier mon profil</h1>
  </div>

  {% if error %}
  <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl text-sm mb-5">{{ error }}</div>
  {% endif %}

  <div class="bg-white rounded-2xl shadow-sm p-6">
    <form method="post" action="/profile/client/edit/" class="space-y-4">
      {% csrf_token %}

      <div>
        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">Nom complet</label>
        <input type="text" name="full_name" value="{{ profile.full_name|default:'' }}" required
          class="w-full border border-gray-200 rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
      </div>

      <div>
        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">Téléphone</label>
        <input type="text" name="phone" value="{{ profile.phone|default:'' }}"
          class="w-full border border-gray-200 rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
      </div>

      <div>
        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">Wilaya</label>
        <select name="wilaya" class="w-full border border-gray-200 rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm bg-white">
          <option value="">-- Sélectionner --</option>
          {% include "web/wilaya_options.html" with selected=profile.wilaya %}
        </select>
      </div>

      <div>
        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">N° Permis de conduire</label>
        <input type="text" name="driver_license" value="{{ profile.driver_license|default:'' }}"
          class="w-full border border-gray-200 rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm font-mono">
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">Âge</label>
          <input type="number" name="age" min="18" max="99" value="{{ profile.age|default:'' }}"
            class="w-full border border-gray-200 rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">Genre</label>
          <select name="gender" class="w-full border border-gray-200 rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm bg-white">
            <option value="">--</option>
            <option value="M" {% if profile.gender == 'M' %}selected{% endif %}>Homme</option>
            <option value="F" {% if profile.gender == 'F' %}selected{% endif %}>Femme</option>
          </select>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">Situation familiale</label>
          <select name="marital_status" class="w-full border border-gray-200 rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm bg-white">
            <option value="">--</option>
            <option value="single" {% if profile.marital_status == 'single' %}selected{% endif %}>Célibataire</option>
            <option value="married" {% if profile.marital_status == 'married' %}selected{% endif %}>Marié(e)</option>
            <option value="divorced" {% if profile.marital_status == 'divorced' %}selected{% endif %}>Divorcé(e)</option>
            <option value="widowed" {% if profile.marital_status == 'widowed' %}selected{% endif %}>Veuf/Veuve</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">Personnes à charge</label>
          <input type="number" name="family_size" min="0" value="{{ profile.family_size|default:'' }}"
            class="w-full border border-gray-200 rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
        </div>
      </div>

      <div class="flex gap-3 pt-2">
        <button type="submit" class="flex-1 bg-blue-600 text-white py-2.5 rounded-xl hover:bg-blue-700 font-bold text-sm transition-colors">
          Enregistrer
        </button>
        <a href="/profile/client/" class="flex-1 text-center border border-gray-200 text-gray-600 py-2.5 rounded-xl hover:bg-gray-50 font-semibold text-sm transition-colors">
          Annuler
        </a>
      </div>
    </form>
  </div>

</div>
{% endblock %}
