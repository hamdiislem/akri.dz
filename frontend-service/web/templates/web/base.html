<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Akri.dz{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- Navbar -->
  <nav class="bg-white shadow-sm border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="/" class="text-xl font-bold text-blue-600">🚗 Akri.dz</a>
      <div class="flex gap-4 items-center text-sm">
        <a href="/cars/" class="text-gray-600 hover:text-blue-600">Voitures</a>
        {% if request.COOKIES.token %}
          <a href="/dashboard/client/" class="text-gray-600 hover:text-blue-600">Mon espace</a>
          <form method="post" action="/logout/" class="inline">{% csrf_token %}
            <button class="text-red-500 hover:text-red-700">Déconnexion</button>
          </form>
        {% else %}
          <a href="/login/" class="text-gray-600 hover:text-blue-600">Connexion</a>
          <a href="/register/client/" class="bg-blue-600 text-white px-3 py-1.5 rounded-lg hover:bg-blue-700">S'inscrire</a>
        {% endif %}
      </div>
    </div>
  </nav>

  <!-- Flash messages -->
  {% if error %}
  <div class="max-w-7xl mx-auto mt-4 px-4">
    <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg">{{ error }}</div>
  </div>
  {% endif %}
  {% if success %}
  <div class="max-w-7xl mx-auto mt-4 px-4">
    <div class="bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-lg">{{ success }}</div>
  </div>
  {% endif %}

  <!-- Content -->
  <main class="max-w-7xl mx-auto px-4 py-8">
    {% block content %}{% endblock %}
  </main>

  <footer class="text-center text-sm text-gray-400 py-6 mt-8 border-t">
    Akri.dz — Location de voitures en Algérie
  </footer>
</body>
</html>
