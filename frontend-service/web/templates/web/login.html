{% extends "web/base.html" %}
{% block title %}Connexion — Akri.dz{% endblock %}
{% block content %}
<div class="max-w-md mx-auto">
  <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
    <div class="bg-gradient-to-r from-slate-900 to-blue-900 px-8 py-7 text-center">
      <h2 class="text-2xl font-black text-white">Connexion</h2>
      <p class="text-slate-400 text-sm mt-1">Bienvenue sur Akri.dz</p>
    </div>
    <div class="p-8">
      <form method="post" action="/login/" class="space-y-4">
        {% csrf_token %}
        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wide">Je suis</label>
          <select name="role" class="w-full border border-gray-200 rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 text-sm">
            <option value="client">Client</option>
            <option value="agency">Agence</option>
            <option value="admin">Administrateur</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wide">Email</label>
          <input type="email" name="email" required
            class="w-full border border-gray-200 rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 text-sm">
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wide">Mot de passe</label>
          <input type="password" name="password" required
            class="w-full border border-gray-200 rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 text-sm">
        </div>
        <button type="submit"
          class="w-full bg-blue-600 text-white py-3 rounded-xl hover:bg-blue-700 font-bold transition-colors mt-2">
          Se connecter
        </button>
      </form>
      <div class="mt-6 text-center text-sm text-gray-500 space-y-1">
        <p>Pas encore de compte ?</p>
        <p>
          <a href="/register/client/" class="text-blue-600 hover:underline font-semibold">S'inscrire comme client</a>
          &nbsp;·&nbsp;
          <a href="/register/agency/" class="text-blue-600 hover:underline font-semibold">Inscrire une agence</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
