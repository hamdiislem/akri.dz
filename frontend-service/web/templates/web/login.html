{% extends "web/base.html" %}
{% block title %}Connexion — Akri.dz{% endblock %}
{% block content %}
<div class="max-w-md mx-auto bg-white rounded-xl shadow-sm p-8">
  <h2 class="text-2xl font-bold text-gray-900 mb-6 text-center">Connexion</h2>

  <form method="post" action="/login/" class="space-y-4">
    {% csrf_token %}

    <!-- Role selector -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Je suis</label>
      <select name="role" class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
        <option value="client">Client</option>
        <option value="agency">Agence</option>
        <option value="admin">Admin</option>
      </select>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
      <input type="email" name="email" required
        class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Mot de passe</label>
      <input type="password" name="password" required
        class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <button type="submit"
      class="w-full bg-blue-600 text-white py-2.5 rounded-lg hover:bg-blue-700 font-medium">
      Se connecter
    </button>
  </form>

  <div class="mt-6 text-center text-sm text-gray-500">
    Pas encore de compte ?
    <a href="/register/client/" class="text-blue-600 hover:underline">S'inscrire comme client</a>
    ou
    <a href="/register/agency/" class="text-blue-600 hover:underline">comme agence</a>
  </div>
</div>
{% endblock %}
