{% extends "web/base.html" %}
{% block title %}Ajouter une voiture — Akri.dz{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto">
  <div class="flex items-center gap-3 mb-6">
    <a href="/dashboard/agency/" class="text-gray-400 hover:text-gray-600 text-sm">← Tableau de bord</a>
    <span class="text-gray-300">/</span>
    <h1 class="text-2xl font-bold text-gray-900">Ajouter une voiture</h1>
  </div>

  <div class="bg-white rounded-xl shadow-sm p-8">
    <form method="post" action="/cars/ajouter/" class="space-y-5">
      {% csrf_token %}

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Marque</label>
          <input type="text" name="make" required value="{{ form.make }}"
            placeholder="Toyota, Renault..."
            class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Modèle</label>
          <input type="text" name="model" required value="{{ form.model }}"
            placeholder="Clio, Corolla..."
            class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
      </div>

      <div class="grid grid-cols-3 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Année</label>
          <input type="number" name="year" required min="2000" max="2025" value="{{ form.year|default:'2020' }}"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Prix / jour (DZD)</label>
          <input type="number" name="price_per_day" required min="0" value="{{ form.price_per_day }}"
            placeholder="5000"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Places</label>
          <input type="number" name="seats" required min="2" max="9" value="{{ form.seats|default:'5' }}"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Boîte de vitesses</label>
          <select name="transmission" required
            class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option value="">— Choisir —</option>
            <option value="MANUAL" {% if form.transmission == 'MANUAL' %}selected{% endif %}>Manuelle</option>
            <option value="AUTOMATIC" {% if form.transmission == 'AUTOMATIC' %}selected{% endif %}>Automatique</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Carburant</label>
          <select name="fuel_type" required
            class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option value="">— Choisir —</option>
            <option value="PETROL" {% if form.fuel_type == 'PETROL' %}selected{% endif %}>Essence</option>
            <option value="DIESEL" {% if form.fuel_type == 'DIESEL' %}selected{% endif %}>Diesel</option>
            <option value="ELECTRIC" {% if form.fuel_type == 'ELECTRIC' %}selected{% endif %}>Électrique</option>
            <option value="HYBRID" {% if form.fuel_type == 'HYBRID' %}selected{% endif %}>Hybride</option>
          </select>
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Wilaya</label>
        <select name="wilaya" required
          class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
          <option value="">— Choisir une wilaya —</option>
          {% include "web/wilaya_options.html" with selected=form.wilaya %}
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">URL de la photo (optionnel)</label>
        <input type="url" name="image_url" value="{{ form.image_url }}"
          placeholder="https://..."
          class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Description (optionnel)</label>
        <textarea name="description" rows="3"
          placeholder="Climatisation, GPS, kilométrage illimité..."
          class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">{{ form.description }}</textarea>
      </div>

      <div class="flex gap-3 pt-2">
        <button type="submit"
          class="flex-1 bg-blue-600 text-white py-2.5 rounded-lg hover:bg-blue-700 font-medium">
          Publier la voiture
        </button>
        <a href="/dashboard/agency/"
          class="flex-1 text-center border border-gray-300 text-gray-600 py-2.5 rounded-lg hover:bg-gray-50">
          Annuler
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
