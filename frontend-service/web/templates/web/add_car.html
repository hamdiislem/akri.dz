{% extends "web/base.html" %}
{% block title %}Ajouter une voiture — Akri.dz{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto">
  <div class="flex items-center gap-3 mb-6">
    <a href="/dashboard/agency/" class="text-gray-400 hover:text-gray-600 text-sm transition-colors">← Tableau de bord</a>
    <span class="text-gray-300">/</span>
    <h1 class="text-2xl font-black text-gray-900">Ajouter une voiture</h1>
  </div>

  <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
    <div class="bg-gradient-to-r from-slate-900 to-blue-900 px-8 py-5">
      <p class="text-slate-300 text-sm">Remplissez les informations de votre véhicule</p>
    </div>
    <div class="p-8">
      <form method="post" action="/cars/ajouter/" class="space-y-5">
        {% csrf_token %}

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wide">Marque</label>
            <input type="text" name="make" required value="{{ form.make }}"
              placeholder="Toyota, Renault..."
              class="w-full border border-gray-200 rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 text-sm">
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wide">Modèle</label>
            <input type="text" name="model" required value="{{ form.model }}"
              placeholder="Clio, Corolla..."
              class="w-full border border-gray-200 rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 text-sm">
          </div>
        </div>

        <div class="grid grid-cols-3 gap-4">
          <div>
            <label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wide">Année</label>
            <input type="number" name="year" required min="2000" max="2026" value="{{ form.year|default:'2022' }}"
              class="w-full border border-gray-200 rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 text-sm">
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wide">Prix / jour (DZD)</label>
            <input type="number" name="price_per_day" required min="0" value="{{ form.price_per_day }}"
              placeholder="5000"
              class="w-full border border-gray-200 rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 text-sm">
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wide">Places</label>
            <input type="number" name="seats" required min="2" max="9" value="{{ form.seats|default:'5' }}"
              class="w-full border border-gray-200 rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 text-sm">
          </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wide">Boîte de vitesses</label>
            <select name="transmission" required
              class="w-full border border-gray-200 rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 text-sm">
              <option value="">— Choisir —</option>
              <option value="MANUAL" {% if form.transmission == 'MANUAL' %}selected{% endif %}>Manuelle</option>
              <option value="AUTOMATIC" {% if form.transmission == 'AUTOMATIC' %}selected{% endif %}>Automatique</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wide">Carburant</label>
            <select name="fuel_type" required
              class="w-full border border-gray-200 rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 text-sm">
              <option value="">— Choisir —</option>
              <option value="PETROL" {% if form.fuel_type == 'PETROL' %}selected{% endif %}>Essence</option>
              <option value="DIESEL" {% if form.fuel_type == 'DIESEL' %}selected{% endif %}>Diesel</option>
              <option value="ELECTRIC" {% if form.fuel_type == 'ELECTRIC' %}selected{% endif %}>Électrique</option>
              <option value="HYBRID" {% if form.fuel_type == 'HYBRID' %}selected{% endif %}>Hybride</option>
            </select>
          </div>
        </div>

        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wide">Wilaya</label>
          <select name="wilaya" required
            class="w-full border border-gray-200 rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 text-sm">
            <option value="">— Choisir une wilaya —</option>
            {% include "web/wilaya_options.html" with selected=form.wilaya %}
          </select>
        </div>

        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wide">Photo de la voiture (optionnel)</label>
          <input type="file" id="photo_file" accept="image/*"
            class="w-full border border-gray-200 rounded-xl px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 text-sm file:mr-3 file:py-1 file:px-3 file:rounded-lg file:border-0 file:text-xs file:bg-blue-600 file:text-white file:font-semibold hover:file:bg-blue-700 file:cursor-pointer">
          <input type="hidden" name="image_url" id="image_url_hidden" value="{{ form.image_url }}">
          <div id="photo_preview" class="mt-3 hidden">
            <img id="preview_img" src="" alt="Aperçu" class="h-36 rounded-xl object-cover border border-gray-200">
          </div>
          <script>
            document.getElementById('photo_file').addEventListener('change', function() {
              const file = this.files[0];
              if (!file) return;
              const reader = new FileReader();
              reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                  const MAX = 800;
                  let w = img.width, h = img.height;
                  if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
                  if (h > MAX) { w = Math.round(w * MAX / h); h = MAX; }
                  const canvas = document.createElement('canvas');
                  canvas.width = w; canvas.height = h;
                  canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                  const compressed = canvas.toDataURL('image/jpeg', 0.75);
                  document.getElementById('image_url_hidden').value = compressed;
                  document.getElementById('preview_img').src = compressed;
                  document.getElementById('photo_preview').classList.remove('hidden');
                };
                img.src = e.target.result;
              };
              reader.readAsDataURL(file);
            });
          </script>
        </div>

        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wide">Description (optionnel)</label>
          <textarea name="description" rows="3"
            placeholder="Climatisation, GPS, kilométrage illimité..."
            class="w-full border border-gray-200 rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 text-sm resize-none">{{ form.description }}</textarea>
        </div>

        <div class="flex gap-3 pt-2">
          <button type="submit"
            class="flex-1 bg-blue-600 text-white py-3 rounded-xl hover:bg-blue-700 font-bold transition-colors">
            Publier la voiture
          </button>
          <a href="/dashboard/agency/"
            class="flex-1 text-center border border-gray-200 text-gray-600 py-3 rounded-xl hover:bg-gray-50 font-semibold transition-colors">
            Annuler
          </a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
