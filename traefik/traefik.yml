# Traefik static configuration
# Deployed on Server 1 (infra server)
# Replace SERVER2_IP, SERVER3_IP, SERVER4_IP with your real VM IPs

api:
  dashboard: true
  insecure: true   # Traefik dashboard at :8080

entryPoints:
  web:
    address: ":80"

providers:
  file:
    filename: /etc/traefik/dynamic.yml
    watch: true

log:
  level: INFO
