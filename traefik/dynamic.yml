# Traefik dynamic configuration
# Replace SERVER2_IP, SERVER3_IP, SERVER4_IP with your actual VM IP addresses

http:
  routers:
    # /api/auth/* → auth-service on Server 2
    auth-router:
      rule: "PathPrefix(`/api/auth`)"
      service: auth-service
      priority: 20

    # /api/* → api-service on Server 3
    api-router:
      rule: "PathPrefix(`/api`)"
      service: api-service
      priority: 10

    # /* → frontend-service on Server 4
    frontend-router:
      rule: "PathPrefix(`/`)"
      service: frontend-service
      priority: 1

  services:
    auth-service:
      loadBalancer:
        servers:
          - url: "http://192.168.56.11:8000"

    api-service:
      loadBalancer:
        servers:
          - url: "http://192.168.56.12:8000"

    frontend-service:
      loadBalancer:
        servers:
          - url: "http://192.168.56.13:8000"
