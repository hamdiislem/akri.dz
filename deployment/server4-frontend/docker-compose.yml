# SERVER 4 — frontend-service
# Copy the frontend-service/ folder to this server, then run: docker compose up -d
# Replace SERVER2_IP and SERVER3_IP with real IPs

services:
  frontend-service:
    build:
      context: ../../frontend-service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      AUTH_SERVICE_URL: http://${SERVER2_IP}:8000
      API_SERVICE_URL: http://${SERVER3_IP}:8000
    restart: unless-stopped
